<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - Wno1 장애우 지원 포털</title>

    <!-- Google Fonts: Cairo -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- FontAwesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-blue: #0056b3;
            --light-blue: #eef4fb;
            --dark-blue: #0a2540;
            --text-color: #333333;
            --gray-bg: #f8f9fa;
        }

        body {
            font-family: 'Cairo', sans-serif;
            color: var(--text-color);
            /* 메인 페이지의 배경색을 활용하여 부드러운 느낌 제공 */
            background-color: var(--gray-bg);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        /* 로그인 컨테이너 래퍼 */
        .login-wrapper {
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }

        /* 로그인 카드 스타일 (메인 페이지의 서비스 카드/모달 느낌 차용) */
        .login-card {
            background: #ffffff;
            border-radius: 20px;
            padding: 50px 40px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
        }

        /* 로고 */
        .brand-logo {
            font-weight: 900;
            font-size: 2.5rem;
            color: var(--dark-blue);
            text-align: center;
            text-decoration: none;
            display: block;
            margin-bottom: 5px;
        }
        .brand-logo span {
            color: var(--primary-blue);
        }

        /* 타이틀 */
        .login-title {
            text-align: center;
            color: #666;
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 40px;
        }

        /* 입력 폼 스타일 (아이콘 포함) */
        .input-icon-wrapper {
            position: relative;
        }
        .input-icon-wrapper i {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #adb5bd;
            font-size: 1.1rem;
            transition: color 0.3s;
        }
        .form-control-lg {
            border-radius: 12px;
            font-size: 1rem;
            padding: 16px 20px 16px 50px; /* 아이콘 공간 확보 */
            background-color: var(--gray-bg);
            border: 1px solid #e9ecef;
            transition: all 0.3s;
        }
        .form-control-lg:focus {
            box-shadow: 0 0 0 4px rgba(0, 86, 179, 0.1);
            border-color: var(--primary-blue);
            background-color: #ffffff;
        }
        .form-control-lg:focus + i,
        .input-icon-wrapper:focus-within i {
            color: var(--primary-blue);
        }

        /* 버튼 스타일 */
        .btn-primary-custom {
            background-color: var(--primary-blue);
            color: white;
            border-radius: 12px;
            padding: 15px;
            font-weight: 700;
            font-size: 1.1rem;
            width: 100%;
            border: none;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(0, 86, 179, 0.2);
        }
        .btn-primary-custom:hover {
            background-color: #004494;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 86, 179, 0.3);
        }

        /* 체크박스 및 링크 */
        .form-check-input:checked {
            background-color: var(--primary-blue);
            border-color: var(--primary-blue);
        }
        .link-custom {
            color: var(--primary-blue);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }
        .link-custom:hover {
            color: #004494;
            text-decoration: underline;
        }

        /* 뒤로가기 버튼 */
        .back-to-home {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #999;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
        }
        .back-to-home:hover {
            color: var(--text-color);
        }
    </style>
</head>
<body>

<div class="login-wrapper">
    <div class="login-card">
        <!-- 로고 영역 -->
        <a href="#" class="brand-logo"><span>W</span>no1</a>
        <div class="login-title">포털 서비스에 오신 것을 환영합니다</div>

        <!-- 로그인 폼 -->
        <form action="/login_check" method="post">
            <div class="mb-3 input-icon-wrapper">
                <input type="text" name="username" class="form-control form-control-lg" placeholder="아이디 또는 이메일" required>
                <i class="far fa-user"></i>
            </div>

            <div class="mb-4 input-icon-wrapper">
                <input type="password" name="password" class="form-control form-control-lg" placeholder="비밀번호" required>
                <i class="fas fa-lock"></i>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="rememberMe">
                    <label class="form-check-label text-muted" for="rememberMe" style="font-size: 0.95rem;">
                        로그인 유지
                    </label>
                </div>
                <a href="#" class="link-custom" style="font-size: 0.95rem;">비밀번호 찾기</a>
            </div>

            <button type="submit" class="btn btn-primary-custom">로그인</button>
        </form>

        <!-- 하단 링크 -->
        <div class="text-center mt-4">
            <span class="text-muted" style="font-size: 0.95rem;">계정이 없으신가요?</span>
            <a href="#" class="link-custom ms-1">회원가입</a>
        </div>
    </div>

    <a href="#" class="back-to-home"><i class="fas fa-arrow-left me-1"></i> 메인 페이지로 돌아가기</a>
</div>

<!-- Bootstrap 5 JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
